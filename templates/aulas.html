
{% extends "base.html" %}

{% block title %}Aulas{% endblock %}

{% block content %}
<h2 class="mb-4">Aulas Registradas</h2>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Turma</th>
            <th>Data</th>
            <th>Descrição</th>
            <th>Abrir</th>
        </tr>
    </thead>
    <tbody>
        {% for aula in aulas %}
        <tr>
            <td>{{ aula.id }}</td>
            <td>{{ aula.turma }}</td>
            <td>{{ aula.data }}</td>
            <td>{{ aula.descricao }}</td>
            <td>
                <a href="{{ url_for('visualizar_aula', aula_id=aula.id) }}"
                   class="btn btn-sm btn-primary">
                    Abrir
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="/" class="btn btn-secondary">Voltar</a>
{% endblock %}
