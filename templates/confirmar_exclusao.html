{% extends "base.html" %}

{% block title %}Excluir Aula{% endblock %}

{% block content %}
<h3 class="mb-4 text-danger">Tem certeza que deseja excluir esta aula?</h3>

<form method="POST" action="/excluir_aula/{{ aula_id }}">
    <button type="submit" class="btn btn-danger">Sim, excluir</button>
    <a href="/aula/{{ aula_id }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
